apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-retail-analytics
  namespace: openshift-user-workload-monitoring
  labels:
    grafana_dashboard: "1"
data:
  retail-analytics-dashboard.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "__requires": [
        {
          "type": "grafana",
          "id": "grafana",
          "name": "Grafana",
          "version": "8.0.0"
        },
        {
          "type": "datasource",
          "id": "prometheus",
          "name": "Prometheus",
          "version": "1.0.0"
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "type": "stat",
          "title": "JVM Uptime (seconds)",
          "datasource": "${DS_PROMETHEUS}",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "max(base_jvm_uptime_seconds{namespace=\"$namespace\",service=\"$service\"})",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "colorMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 0
            },
            "overrides": []
          }
        },
        {
          "type": "stat",
          "title": "Heap Used",
          "datasource": "${DS_PROMETHEUS}",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "max(base_memory_usedHeap_bytes{namespace=\"$namespace\",service=\"$service\"})",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "colorMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "decimals": 1
            },
            "overrides": []
          }
        },
        {
          "type": "stat",
          "title": "CPU Load (process)",
          "datasource": "${DS_PROMETHEUS}",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "max(base_cpu_processCpuLoad{namespace=\"$namespace\",service=\"$service\"})",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "colorMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 2
            },
            "overrides": []
          }
        },
        {
          "type": "stat",
          "title": "Threads",
          "datasource": "${DS_PROMETHEUS}",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "max(base_thread_count{namespace=\"$namespace\",service=\"$service\"})",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "colorMode": "value"
          },
          "fieldConfig": {
            "defaults": { "decimals": 0 },
            "overrides": []
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["retail-analytics", "openshift", "wildfly"],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": "${DS_PROMETHEUS}",
            "query": "label_values(base_jvm_uptime_seconds, namespace)",
            "refresh": 1,
            "hide": 0,
            "current": { "text": "application", "value": "application" }
          },
          {
            "name": "service",
            "type": "query",
            "datasource": "${DS_PROMETHEUS}",
            "query": "label_values(base_jvm_uptime_seconds{namespace=\"$namespace\"}, service)",
            "refresh": 1,
            "hide": 0,
            "current": { "text": "retail-analytics", "value": "retail-analytics" }
          }
        ]
      },
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Retail Analytics - Application (WildFly + Postgres)",
      "uid": "retail-analytics-app",
      "version": 1,
      "weekStart": ""
    }
