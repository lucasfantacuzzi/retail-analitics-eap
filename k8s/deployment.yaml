apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-analytics
  namespace: application
  labels:
    app: retail-analytics
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: retail-analytics
  template:
    metadata:
      labels:
        app: retail-analytics
    spec:
      containers:
        - name: retail-analytics
          image: image-registry.openshift-image-registry.svc.cluster.local:5000/application/retail-analytics:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1024Mi"
          env:
            - name: POSTGRES_SERVICE_HOST
              value: "postgres"
            - name: POSTGRES_SERVICE_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: POSTGRES_DB
          readinessProbe:
            httpGet:
              path: /retail-analytics/api/sales/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /retail-analytics/api/sales/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
